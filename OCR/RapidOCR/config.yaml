server:
  host: "0.0.0.0"
  port: 8002
  log_level: "info"
  temp_dir: "temp_files"
  log_file: "logs/app.log"

models:
  ocr:
    det_model_path: "loacl_models/PP-OCRv6/det/PP-OCRv6_det_small.onnx"
    cls_model_path: null      # null=用 whl 内置默认 cls（v4 mobile），与默认 cls_image_shape 匹配，无尺寸问题
    rec_model_path: "loacl_models/PP-OCRv6/rec/PP-OCRv6_rec_small.onnx"
    rec_keys_path: null      # onnxruntime 下字典已内嵌在 ONNX 里，本字段不生效（仅 paddle/mnn 等引擎才需要）
    intra_op_num_threads: 4

concurrency:
  thread_pool_size: 4
  max_concurrent_ocr: 2

upload:
  max_file_size_mb: 20
  allowed_extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".bmp"
    - ".webp"
    - ".tif"
    - ".tiff"
